services:
  gateway:
    build: .
    container_name: llm-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Inside the compose network, services are reachable by name.
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://gw:gw@postgres:5432/gateway
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

    # --- Dev mode (live reload) ------------------------------------------
    # volumes:
    #   - ./app:/app/app
    # command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  redis:
    image: redis:7-alpine
    container_name: llm-gateway-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-gateway-postgres
    environment:
      POSTGRES_USER: gw
      POSTGRES_PASSWORD: gw
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"
    volumes:
      # Runs once on first boot to create the extension + tables.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
