services:
  gateway:
    build: .
    container_name: llm-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://gw:gw@postgres:5432/gateway
      # For benchmarking the cache contrast, give the mock provider a fake delay:
      # MOCK_LATENCY_MS: "600"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

    # --- Dev mode (live reload, no rebuild on code changes) --------------
    # volumes:
    #   - ./app:/app/app
    # command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  redis:
    image: redis:7-alpine
    container_name: llm-gateway-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-gateway-postgres
    environment:
      POSTGRES_USER: gw
      POSTGRES_PASSWORD: gw
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Optional monitoring stack (uncomment to enable) -----------------------
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: llm-gateway-prometheus
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   ports: ["9090:9090"]
  #   depends_on: [gateway]
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: llm-gateway-grafana
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #   ports: ["3000:3000"]
  #   depends_on: [prometheus]

volumes:
  pgdata:
